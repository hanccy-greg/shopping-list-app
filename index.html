<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span { font-size: 1.8rem; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a2e;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #574fd6; }
    .input-row button:active { transform: scale(0.97); }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .stats strong { color: #6c63ff; }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7f8fc;
      transition: background 0.2s, opacity 0.2s;
      cursor: default;
    }

    li:hover { background: #eef0fb; }

    li.done {
      opacity: 0.55;
      background: #f0f0f0;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: text-decoration 0.2s;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #b0b8c8;
      padding: 32px 0;
      font-size: 0.97rem;
    }

    .empty span { font-size: 2.4rem; display: block; margin-bottom: 8px; }

    .clear-done {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-done:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }

    .clear-done:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      color: #b0b8c8;
      padding: 32px 0;
      font-size: 0.97rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템을 입력하세요..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span>전체 <strong id="totalCount">0</strong>개</span>
      <span>완료 <strong id="doneCount">0</strong>개</span>
    </div>

    <ul id="list"></ul>

    <div id="empty" class="empty" style="display:none;">
      <span>🛍️</span>
      아직 아이템이 없습니다.<br/>위에서 추가해 보세요!
    </div>

    <div id="loadingEl" class="loading">불러오는 중...</div>

    <button class="clear-done" id="clearDoneBtn" onclick="clearDone()" disabled>
      완료된 항목 삭제
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://cdnnnzryzdlcxyohhshe.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkbm5uenJ5emRsY3h5b2hoc2hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTc1NTYsImV4cCI6MjA5MDE3MzU1Nn0.x62sI4WfN7QBWixyD-8a5FqhZwoTy8nOQciLFjhYOB8';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      document.getElementById('loadingEl').style.display = 'none';

      if (error) {
        console.error('불러오기 실패:', error);
        return;
      }

      items = data;
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const clearDoneBtn = document.getElementById('clearDoneBtn');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        items.forEach((item) => {
          const li = document.createElement('li');
          if (item.done) li.classList.add('done');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = item.done;
          cb.onchange = () => toggleItem(item.id, !item.done);

          const span = document.createElement('span');
          span.className = 'item-text';
          span.textContent = item.text;

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.innerHTML = '✕';
          del.title = '삭제';
          del.onclick = () => deleteItem(item.id);

          li.appendChild(cb);
          li.appendChild(span);
          li.appendChild(del);
          list.appendChild(li);
        });
      }

      const total = items.length;
      const done = items.filter(i => i.done).length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('doneCount').textContent = done;
      clearDoneBtn.disabled = done === 0;
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();

      if (error) { console.error('추가 실패:', error); return; }

      items.push(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggleItem(id, done) {
      const { error } = await db
        .from('shopping_items')
        .update({ done })
        .eq('id', id);

      if (error) { console.error('수정 실패:', error); return; }

      const item = items.find(i => i.id === id);
      if (item) item.done = done;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { console.error('삭제 실패:', error); return; }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.done).map(i => i.id);
      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) { console.error('삭제 실패:', error); return; }

      items = items.filter(i => !i.done);
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
